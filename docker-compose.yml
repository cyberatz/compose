  hass-configurator:
    container_name: hass-configurator
    image: "causticlab/hass-configurator-docker:x86_64"
    environment:
      - TZ=Europe/Zurich
    restart: always
    #network_mode: "service:homeassistant"
    ports:
      - "3218:3218/tcp"
    mem_limit: 64m
    volumes:
      - /data/hass/homeassistant-configurator:/config
      - /data/hass:/hass-config



